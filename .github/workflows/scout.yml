name: Comedy Cellar Scout

on:
  # Times are UTC. Through end of July, NYC is EDT (UTC-4).
  schedule:
    # Morning catch-up ≈ 10am ET — picks up anything posted overnight.
    - cron: "0 14 * * *"
    # Evening sweep every 30 min, 6pm ET–midnight ET (22:00–23:59 UTC):
    # this is when lineups drop and good shows sell out, so we scan often.
    - cron: "0,30 22-23 * * *"
    # …continuing past midnight ET into the small hours (00:00–03:59 UTC).
    - cron: "0,30 0-3 * * *"
  # Manual "Run workflow" button in the Actions tab.
  workflow_dispatch:
  # Re-deploy whenever you push code/availability changes.
  push:
    branches: [main]

# GITHUB_TOKEN needs to commit refreshed data and publish Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Only one run at a time; let a newer run cancel an in-flight one.
concurrency:
  group: scout
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python scout.py

      - name: Commit refreshed data
        run: |
          git config user.name  "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          # Stage data files; alerted.json only exists once an alert has fired.
          git add scout_data.json comic_links.json
          if [ -f alerted.json ]; then git add alerted.json; fi
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "Refresh lineup data + comic links [skip ci]"
          # The remote moves often (other scans, web-app config edits), so a
          # plain push can be rejected. Retry, rebasing our data commit on top
          # and preferring our freshly-generated data on any conflict.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto latest."
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
          done
          echo "Could not push after retries."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the static site files only.
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

name: Comedy Cellar Scout

on:
  # Times are UTC. Through end of July, NYC is EDT (UTC-4).
  # Goal: never miss a standout while it's still bookable, so we scan every
  # 30 min across the whole active day — no daytime gap where a show can post
  # and sell out unseen. Scoring is cached per lineup, so re-scanning an
  # unchanged bill costs ~nothing.
  schedule:
    # Daytime + evening: every 30 min, 10am ET–7:30pm ET (14:00–23:59 UTC).
    - cron: "0,30 14-23 * * *"
    # …continuing through midnight ET into the small hours (00:00–03:59 UTC).
    - cron: "0,30 0-3 * * *"
    # One more at 4am ET to catch very-late overnight postings.
    - cron: "0 8 * * *"
  # Manual "Run workflow" button in the Actions tab.
  workflow_dispatch:
    inputs:
      send_test_alert:
        description: "Send a test WhatsApp alert to confirm notifications work"
        type: boolean
        default: false
  # Re-deploy whenever you push code/availability changes.
  push:
    branches: [main]

# GITHUB_TOKEN needs to commit refreshed data and publish Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Only one run at a time; let a newer run cancel an in-flight one.
concurrency:
  group: scout
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On-demand proof that the WhatsApp pipeline works end-to-end with the
      # real secrets, without waiting for a live standout. Trigger via the
      # "Run workflow" button with "Send a test WhatsApp alert" checked.
      - name: Send test WhatsApp alert
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_alert }}
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          if [ -z "${CALLMEBOT_PHONE}" ] || [ -z "${CALLMEBOT_APIKEY}" ]; then
            echo "::error::CallMeBot secrets are not set."
            exit 1
          fi
          TEXT="✅ Comedy Cellar Scout test alert — your WhatsApp notifications are working. You can ignore this message."
          echo "Sending test alert to ${CALLMEBOT_PHONE} …"
          RESP="$(curl -sS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${CALLMEBOT_PHONE}" \
            --data-urlencode "apikey=${CALLMEBOT_APIKEY}" \
            --data-urlencode "text=${TEXT}")"
          echo "CallMeBot response: ${RESP}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python scout.py

      - name: Commit refreshed data
        run: |
          git config user.name  "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          # Stage data files; alerted.json only exists once an alert has fired.
          git add scout_data.json comic_links.json
          if [ -f alerted.json ]; then git add alerted.json; fi
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "Refresh lineup data + comic links [skip ci]"
          # The remote moves often (other scans, web-app config edits), so a
          # plain push can be rejected. Retry, rebasing our data commit on top
          # and preferring our freshly-generated data on any conflict.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto latest."
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
          done
          echo "Could not push after retries."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the static site files only.
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # Only fires if an earlier step failed. Pings WhatsApp so a silent
      # breakage (scraper change, token expiry, API outage) doesn't just
      # quietly stop the alerts. This is the "unless I have to" notification.
      - name: Notify on failure (WhatsApp)
        if: failure()
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="⚠️ Comedy Cellar Scout scan FAILED. No lineups were checked this run. Logs: ${RUN_URL}"
          curl -s -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${CALLMEBOT_PHONE}" \
            --data-urlencode "apikey=${CALLMEBOT_APIKEY}" \
            --data-urlencode "text=${TEXT}" || true
